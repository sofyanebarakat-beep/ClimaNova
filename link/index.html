<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>ClimaNova Énergie — Devis & Contact</title>
<meta name="description" content="ClimaNova Énergie — Climatisation, Chauffage, Plomberie & Électricité. Certifié RGE. Demandez un devis gratuit.">

<meta property="og:description" content="Solutions énergétiques intelligentes pour un avenir durable. Devis gratuit & sans engagement.">

<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://climanova-energie.fr/link/">
<link rel="shortcut icon" href="/images/69787fd4f36671416d6263df_ClimaNova Energie-favicon.png" type="image/x-icon">
<link rel="apple-touch-icon" href="/images/6978808c50851a02e3fc681e_ClimaNova Energie-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:        #1664bf;
  --blue-mid:    #1a72d2;
  --blue-light:  #2e8bec;
  --green:       #10b981;
  --green-dark:  #047857;
  --wa:          #25d366;
  --wa-dark:     #1aaa4a;
  --text:        #0d1b2a;
  --text-soft:   #3d5166;
  --text-muted:  #6b7f95;
  --card-bg:     rgba(255,255,255,0.94);
  --border:      rgba(22,100,191,0.12);
  --radius-lg:   22px;
  --radius-md:   16px;
  --radius-sm:   12px;
  --ease:        cubic-bezier(0.22, 1, 0.36, 1);
  --t:           0.26s;
}

[data-theme="dark"] {
  --text:       #edf2f7;
  --text-soft:  #94afc8;
  --text-muted: #637d96;
  --card-bg:    rgba(11,20,34,0.95);
  --border:     rgba(255,255,255,0.08);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Instrument Sans', system-ui, sans-serif;
  min-height: 100dvh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 14px 44px;
  background: #060d1a;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow-x: hidden;
}

/* ─── Background ─────────────────────────────────────────── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(160deg, #050e20 0%, #091c38 35%, #07301f 65%, #050e20 100%);
  background-size: 300% 300%;
  animation: bgShift 16s ease infinite;
}
@keyframes bgShift {
  0%,100% { background-position: 0% 0%; }
  50%      { background-position: 100% 100%; }
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(22,100,191,.32),transparent);top:-120px;left:-140px;animation:b1 12s ease-in-out infinite; }
.blob-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,.28),transparent);bottom:-80px;right:-100px;animation:b1 12s ease-in-out infinite;animation-delay:-6s; }
.blob-3 { width:300px;height:300px;background:radial-gradient(circle,rgba(22,207,243,.2),transparent);top:45%;left:50%;transform:translate(-50%,-50%);animation:b3 10s ease-in-out infinite;animation-delay:-3s; }
@keyframes b1 { 0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)} }
@keyframes b3 { 0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-53%) scale(1.07)} }

/* ─── Card ───────────────────────────────────────────────── */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 430px;
  background: var(--card-bg);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 40px 100px rgba(5,14,32,.28), 0 8px 28px rgba(5,14,32,.14);
  overflow: hidden;
  animation: cardRise 0.7s var(--ease) both;
}
@keyframes cardRise {
  from { opacity:0; transform:translateY(28px) scale(.97); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}

/* ─── Card top accent bar ────────────────────────────────── */
.card-accent {
  height: 4px;
  background: linear-gradient(90deg, #1664bf, #16cff3, #10b981);
  background-size: 200% 100%;
  animation: accentSlide 4s linear infinite;
}
@keyframes accentSlide {
  0%   { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

/* ─── Card inner ─────────────────────────────────────────── */
.card-inner { padding: 28px 24px 32px; }

/* ─── Dark toggle ────────────────────────────────────────── */
.dark-toggle {
  position: absolute;
  top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: rgba(22,100,191,0.06);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 15px;
  line-height: 1;
  transition: background var(--t) var(--ease), border-color var(--t) var(--ease);
  z-index: 2;
}
.dark-toggle:hover { background: rgba(22,100,191,0.14); border-color: rgba(22,100,191,.35); }

/* ─── Profile ────────────────────────────────────────────── */
.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 4px;
  margin-bottom: 22px;
}

.logo-ring {
  position: relative;
  width: 140px; height: 140px;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.logo-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(#1664bf, #16cff3, #10b981, #1664bf);
  animation: spin 5s linear infinite;
  opacity: 0.7;
}
@keyframes spin { to { transform: rotate(360deg); } }
.logo-ring::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 50%;
  background: var(--card-bg);
}
.logo-circle {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  border-radius: 50%;
  background: #fff;
  display: grid;
  place-items: center;
  overflow: hidden;
}
.logo-circle img {
  width: 132px; height: 132px;
  object-fit: contain;
}

.profile-name {
  font-size: 21px;
  font-weight: 800;
  letter-spacing: -0.035em;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 6px;
}

.profile-tagline {
  font-size: 17px;
  font-weight: 800;
  line-height: 1.35;
  max-width: 260px;
  background: linear-gradient(135deg, #1664bf 0%, #16cff3 50%, #10b981 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}

/* ─── Service icons grid ─────────────────────────────────── */
.services-grid {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 18px;
}
.svc-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 58px;
}
.svc-circle {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2.5px solid;
  display: grid;
  place-items: center;
  background: transparent;
  transition: transform var(--t) var(--ease), box-shadow var(--t) var(--ease);
}
.svc-item:hover .svc-circle { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,.18); }
.svc-circle svg { width: 28px; height: 28px; }
.svc-circle.clim  { border-color: #1664bf; color: #1664bf; }
.svc-circle.chauf { border-color: #e74c3c; color: #e74c3c; }
.svc-circle.elec  { border-color: #10b981; color: #10b981; }
.svc-circle.plomb { border-color: #1664bf; color: #1664bf; }
.svc-circle.renov { border-color: #f59e0b; color: #f59e0b; }
.svc-label {
  font-size: 9.5px;
  font-weight: 800;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
  line-height: 1.2;
}

/* ─── Divider ────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
  margin: 22px 0;
}

/* ─── PRIMARY CTA ────────────────────────────────────────── */
.cta-primary-wrap {
  margin-bottom: 14px;
}

.cta-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  min-height: 84px;
  padding: 18px 24px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #1b74d6 0%, #0f4fae 50%, #0a3a82 100%);
  background-size: 200% 200%;
  color: #fff;
  font-family: inherit;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.025em;
  text-decoration: none;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  animation: ctaGlow 3s ease-in-out infinite;
  transition: transform var(--t) var(--ease), box-shadow var(--t) var(--ease), filter var(--t) var(--ease);
  box-shadow: 0 6px 28px rgba(22,100,191,.5), 0 2px 8px rgba(22,100,191,.3);
  -webkit-tap-highlight-color: transparent;
}
@keyframes ctaGlow {
  0%,100% { box-shadow: 0 6px 28px rgba(22,100,191,.5), 0 2px 8px rgba(22,100,191,.3); }
  50%      { box-shadow: 0 8px 38px rgba(22,100,191,.7), 0 2px 12px rgba(22,100,191,.4); }
}
.cta-primary::before {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 60%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.22), transparent);
  transform: skewX(-18deg);
  transition: left 0.6s ease;
  pointer-events: none;
}
.cta-primary:hover::before { left: 130%; }
.cta-primary:hover {
  transform: translateY(-3px) scale(1.015);
  filter: brightness(1.08);
}
.cta-primary:active { transform: scale(0.97) !important; filter: brightness(.96) !important; }

.cta-primary-icon {
  width: 48px; height: 48px;
  border-radius: 13px;
  background: rgba(255,255,255,0.18);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background var(--t) var(--ease);
}
.cta-primary:hover .cta-primary-icon { background: rgba(255,255,255,.28); }
.cta-primary-icon svg { width: 24px; height: 24px; }

.cta-primary-text {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
}
.cta-primary-title { font-size: 18px; font-weight: 800; line-height: 1.1; }
.cta-primary-sub   { font-size: 12.5px; font-weight: 500; opacity: 0.85; }

.cta-primary-arrow {
  margin-left: auto;
  opacity: 0.7;
  transition: transform var(--t) var(--ease), opacity var(--t) var(--ease);
}
.cta-primary-arrow svg { width: 20px; height: 20px; }
.cta-primary:hover .cta-primary-arrow { transform: translateX(4px); opacity: 1; }

/* ─── Secondary buttons ──────────────────────────────────── */
.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

.link-btn {
  display: grid;
  grid-template-columns: 42px 1fr 24px;
  align-items: center;
  width: 100%;
  min-height: 58px;
  padding: 9px 13px 9px 9px;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 14.5px;
  font-weight: 700;
  letter-spacing: -0.015em;
  text-decoration: none;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform var(--t) var(--ease), box-shadow var(--t) var(--ease), filter var(--t) var(--ease);
  box-shadow: 0 4px 16px rgba(5,14,32,.12);
  -webkit-tap-highlight-color: transparent;
}
.link-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 55%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.16), transparent);
  transform: skewX(-18deg);
  transition: left 0.5s ease;
  pointer-events: none;
}
.link-btn:hover::before { left: 130%; }
.link-btn:hover {
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 8px 28px rgba(5,14,32,.18);
  filter: brightness(1.05);
}
.link-btn:active { transform: scale(0.97) !important; filter: brightness(.95) !important; }

.btn-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.16);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background var(--t) var(--ease);
}
.link-btn:hover .btn-icon { background: rgba(255,255,255,.24); }
.btn-icon svg { width: 18px; height: 18px; }

.btn-label { text-align: center; line-height: 1.2; }

.btn-arr {
  display: grid;
  place-items: center;
  opacity: 0.5;
  transition: transform var(--t) var(--ease), opacity var(--t) var(--ease);
}
.btn-arr svg { width: 15px; height: 15px; }
.link-btn:hover .btn-arr { transform: translateX(3px); opacity: .85; }

/* Variants */
.btn-green    { background: linear-gradient(135deg, #12c98a 0%, #047857 100%); color: #fff; }
.btn-whatsapp { background: linear-gradient(135deg, #3bdc73 0%, #18a845 100%); color: #fff; }
.btn-dark     { background: linear-gradient(135deg, #1c3050 0%, #0d1b2a 100%); color: #fff; }
.btn-outline  {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border);
  box-shadow: none;
  filter: none !important;
}
.btn-outline .btn-icon { background: rgba(22,100,191,.08); }
.btn-outline .btn-arr  { color: var(--text-muted); }
.btn-outline:hover {
  background: rgba(22,100,191,.05);
  border-color: rgba(22,100,191,.28);
  box-shadow: none !important;
  transform: translateY(-1px) !important;
}
.btn-outline:hover .btn-icon { background: rgba(22,100,191,.13); }

[data-theme="dark"] .btn-outline { border-color: rgba(255,255,255,.12); }
[data-theme="dark"] .btn-outline:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.22); }

/* ─── Social row ─────────────────────────────────────────── */
.social-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
}
.soc-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: rgba(22,100,191,.05);
  display: grid;
  place-items: center;
  color: var(--text-muted);
  text-decoration: none;
  transition: background var(--t) var(--ease), border-color var(--t) var(--ease), color var(--t) var(--ease), transform var(--t) var(--ease);
}
.soc-btn:hover {
  background: rgba(22,100,191,.12);
  border-color: rgba(22,100,191,.35);
  color: var(--blue);
  transform: translateY(-3px);
}
.soc-btn svg { width: 18px; height: 18px; }

/* ─── Footer ─────────────────────────────────────────────── */
.card-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.7;
}
.card-footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
.card-footer a:hover { text-decoration: underline; }

/* ─── Ripple ─────────────────────────────────────────────── */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,.3);
  transform: scale(0);
  animation: ripple .55s linear;
  pointer-events: none;
}
@keyframes ripple { to { transform: scale(4.5); opacity: 0; } }

/* ─── Mobile ─────────────────────────────────────────────── */
@media (max-width: 390px) {
  body { padding: 10px 10px 36px; }
  .card-inner { padding: 22px 18px 26px; }
  .profile-name { font-size: 19px; }
  .logo-ring { width: 118px; height: 118px; }
  .logo-circle img { width: 110px; height: 110px; }
  .cta-primary { min-height: 74px; font-size: 16px; }
  .cta-primary-title { font-size: 16px; }
  .link-btn { font-size: 13.5px; min-height: 54px; }
  .services-grid { gap: 12px; }
  .svc-circle { width: 52px; height: 52px; }
  .svc-circle svg { width: 24px; height: 24px; }
}
</style>

<body>

<div class="bg" aria-hidden="true"></div>
<div class="blob blob-1" aria-hidden="true"></div>
<div class="blob blob-2" aria-hidden="true"></div>
<div class="blob blob-3" aria-hidden="true"></div>

<div class="card" role="main">

  <div class="card-accent" aria-hidden="true"></div>

  <button class="dark-toggle" id="darkToggle" aria-label="Basculer mode sombre">
    <span id="darkIcon">🌙</span>
  </button>

  <div class="card-inner">

    <!-- Profile -->
    <div class="profile">
      <div class="logo-ring" aria-hidden="true">
        <div class="logo-circle">
          <img src="/images/climanova-logo-premium.svg" alt="ClimaNova Énergie" width="132" height="132" loading="eager">
        </div>
      </div>
      <h1 class="profile-name">ClimaNova Énergie</h1>
      <p class="profile-tagline">Votre confort, notre<br>énergie</p>
    </div>

    <!-- Services -->
    <div class="services-grid" aria-label="Nos domaines">
      <div class="svc-item">
        <div class="svc-circle clim">
          <!-- snowflake -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="20" y1="4" x2="4" y2="20"/><line x1="4" y1="4" x2="20" y2="20"/>
            <polyline points="12 6 9 3 12 6 15 3"/><polyline points="12 18 9 21 12 18 15 21"/><polyline points="6 12 3 9 6 12 3 15"/><polyline points="18 12 21 9 18 12 21 15"/>
          </svg>
        </div>
        <span class="svc-label">Climatisation</span>
      </div>
      <div class="svc-item">
        <div class="svc-circle chauf">
          <!-- flame -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </div>
        <span class="svc-label">Chauffage</span>
      </div>
      <div class="svc-item">
        <div class="svc-circle elec">
          <!-- plug -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="8" y2="2"/><line x1="16" y1="6" x2="16" y2="2"/><rect x="6" y="6" width="12" height="8" rx="2"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="9" y1="18" x2="15" y2="18"/>
          </svg>
        </div>
        <span class="svc-label">Électricité</span>
      </div>
      <div class="svc-item">
        <div class="svc-circle plomb">
          <!-- droplet/faucet -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5S12 4 12 2c0 0-7 6-7 13a7 7 0 0 0 7 7z"/>
          </svg>
        </div>
        <span class="svc-label">Plomberie</span>
      </div>
      <div class="svc-item">
        <div class="svc-circle renov">
          <!-- hard hat / renovation -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script>
// Dark mode
const toggle = document.getElementById('darkToggle');
const icon   = document.getElementById('darkIcon');
const root   = document.documentElement;
if (localStorage.getItem('cn-theme') === 'dark') { root.dataset.theme = 'dark'; icon.textContent = '☀️'; }
toggle.addEventListener('click', () => {
  const dark = root.dataset.theme === 'dark';
  root.dataset.theme = dark ? '' : 'dark';
  icon.textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('cn-theme', dark ? 'light' : 'dark');
});

// Ripple on all buttons
document.querySelectorAll('.link-btn, .cta-primary').forEach(btn => {
  btn.addEventListener('click', e => {
    const r = btn.getBoundingClientRect();
    const s = Math.max(r.width, r.height);
    const el = document.createElement('span');
    el.className = 'ripple';
    Object.assign(el.style, {
      width: s+'px', height: s+'px',
      left: (e.clientX - r.left - s/2)+'px',
      top:  (e.clientY - r.top  - s/2)+'px'
    });
    btn.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  });
});
</script>
