name: Daily ClimaNova SEO articles

on:
  schedule:
    - cron: "15 7 * * *"
      timezone: "Europe/Paris"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: daily-climanova-seo
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate seven articles
        env:
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4.1' }}
        run: node scripts/generate-daily-articles.mjs

      - name: Validate generated pages
        run: node scripts/validate-daily-articles.mjs

      - name: Commit and publish
        run: |
          if git diff --quiet && test -z "$(git status --porcelain)"; then
            echo "Nothing new to publish."
            exit 0
          fi
          git config user.name "climanova-content-bot"
          git config user.email "climanova-content-bot@users.noreply.github.com"
          git add blog/ sitemap.xml scripts/daily-article-history.json
          git commit -m "Publish daily ClimaNova SEO articles $(date +%F)"
          git push origin main
