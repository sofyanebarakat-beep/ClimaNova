<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 787" width="1400" height="787">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2d5a;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#0f4c81;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a3d6e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a2d5a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0a3d6e;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#26c6da;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#26c6da;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="60" y="80" width="680" height="620" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1400" height="787" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="200" rx="320" ry="280" fill="url(#blob1)" filter="url(#blur)" opacity="0.7"/>
  <ellipse cx="1200" cy="600" rx="380" ry="300" fill="url(#blob2)" filter="url(#blur)" opacity="0.6"/>
  <ellipse cx="900" cy="150" rx="220" ry="180" fill="#1565c0" fill-opacity="0.18" filter="url(#blur)"/>

  <!-- Sky gradient top area -->
  <rect x="0" y="0" width="1400" height="400" fill="url(#skyGrad)"/>

  <!-- Sun (Mediterranean) -->
  <circle cx="1100" cy="130" r="80" fill="url(#sunGrad)" opacity="0.85"/>
  <circle cx="1100" cy="130" r="95" fill="#FFD700" fill-opacity="0.15"/>
  <circle cx="1100" cy="130" r="115" fill="#FFD700" fill-opacity="0.07"/>

  <!-- Nice skyline silhouette -->
  <!-- Buildings left -->
  <rect x="0" y="520" width="80" height="267" fill="#061a3a" opacity="0.6"/>
  <rect x="85" y="490" width="60" height="297" fill="#061a3a" opacity="0.5"/>
  <rect x="150" y="540" width="70" height="247" fill="#061a3a" opacity="0.55"/>
  <!-- Buildings far right -->
  <rect x="1280" y="500" width="70" height="287" fill="#061a3a" opacity="0.55"/>
  <rect x="1340" y="525" width="60" height="262" fill="#061a3a" opacity="0.5"/>
  <!-- Sea horizon -->
  <rect x="0" y="600" width="1400" height="187" fill="url(#seaGrad)" opacity="0.5"/>
  <!-- Sea shimmer lines -->
  <line x1="0" y1="620" x2="1400" y2="620" stroke="white" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="0" y1="640" x2="1400" y2="640" stroke="white" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="0" y1="660" x2="1400" y2="660" stroke="white" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Palm tree right side -->
  <line x1="1240" y1="787" x2="1260" y2="430" stroke="#0a2a1a" stroke-width="14" stroke-linecap="round"/>
  <!-- Palm leaves -->
  <path d="M1260 430 Q1200 380 1150 350" stroke="#1a6b30" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M1260 430 Q1310 370 1350 330" stroke="#1a6b30" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M1260 430 Q1230 360 1220 310" stroke="#1a6b30" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M1260 430 Q1290 380 1320 360" stroke="#1a6b30" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M1260 430 Q1260 370 1240 340" stroke="#1a6b30" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- MAIN CARD -->
  <rect x="60" y="80" width="680" height="620" rx="24" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="80" width="680" height="620" rx="24" fill="rgba(6,22,58,0.55)"/>

  <!-- Card accent bar top -->
  <rect x="60" y="80" width="680" height="5" rx="2" fill="url(#sunGrad)" opacity="0.9"/>

  <!-- Tag badge -->
  <rect x="100" y="118" width="180" height="32" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="190" y="139" font-family="'Instrument Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">GUIDE COMPLET 2026</text>

  <!-- Location badge -->
  <rect x="300" y="118" width="160" height="32" rx="16" fill="rgba(255,200,0,0.18)" stroke="rgba(255,200,0,0.4)" stroke-width="1"/>
  <text x="380" y="139" font-family="'Instrument Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFD700" text-anchor="middle" letter-spacing="0.5">📍 NICE · 06</text>

  <!-- Main Title -->
  <text x="100" y="215" font-family="'Instrument Sans', system-ui, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">Entretien</text>
  <text x="100" y="263" font-family="'Instrument Sans', system-ui, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">Climatisation</text>
  <text x="100" y="311" font-family="'Instrument Sans', system-ui, sans-serif" font-size="38" font-weight="800" fill="#42a5f5" letter-spacing="-0.5">Nice</text>

  <!-- Separator line -->
  <rect x="100" y="330" width="520" height="2" rx="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Subtitle -->
  <text x="100" y="365" font-family="'Instrument Sans', system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" letter-spacing="0.2">Prix · Fréquence · 8 étapes · Prestataires certifiés RGE</text>

  <!-- Stat boxes row -->
  <!-- Box 1 -->
  <rect x="100" y="395" width="140" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="170" y="430" font-family="'Instrument Sans', system-ui, sans-serif" font-size="24" font-weight="800" fill="#42a5f5" text-anchor="middle">80 €</text>
  <text x="170" y="455" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Prix dès</text>
  <!-- Box 2 -->
  <rect x="255" y="395" width="140" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="325" y="430" font-family="'Instrument Sans', system-ui, sans-serif" font-size="24" font-weight="800" fill="#66bb6a" text-anchor="middle">7j/7</text>
  <text x="325" y="455" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Disponibilité</text>
  <!-- Box 3 -->
  <rect x="410" y="395" width="140" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="480" y="430" font-family="'Instrument Sans', system-ui, sans-serif" font-size="24" font-weight="800" fill="#FFD700" text-anchor="middle">48h</text>
  <text x="480" y="455" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Intervention</text>

  <!-- Season tip -->
  <rect x="100" y="497" width="520" height="50" rx="10" fill="rgba(66,165,245,0.12)" stroke="rgba(66,165,245,0.3)" stroke-width="1"/>
  <text x="124" y="527" font-family="'Instrument Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">☀️ Meilleure période : <tspan font-weight="700" fill="white">avril – mai</tspan> avant la saison estivale</text>

  <!-- RGE + QualiClima badges -->
  <rect x="100" y="567" width="100" height="32" rx="8" fill="rgba(102,187,106,0.2)" stroke="rgba(102,187,106,0.5)" stroke-width="1"/>
  <text x="150" y="587" font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="700" fill="#66bb6a" text-anchor="middle">✓ RGE</text>

  <rect x="215" y="567" width="140" height="32" rx="8" fill="rgba(66,165,245,0.2)" stroke="rgba(66,165,245,0.5)" stroke-width="1"/>
  <text x="285" y="587" font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="700" fill="#42a5f5" text-anchor="middle">✓ QualiClima</text>

  <rect x="370" y="567" width="140" height="32" rx="8" fill="rgba(255,200,0,0.15)" stroke="rgba(255,200,0,0.4)" stroke-width="1"/>
  <text x="440" y="587" font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFD700" text-anchor="middle">5 000+ clients</text>

  <!-- CTA Button -->
  <rect x="100" y="618" width="280" height="52" rx="26" fill="#1664bf"/>
  <rect x="100" y="618" width="280" height="52" rx="26" fill="rgba(255,255,255,0.08)"/>
  <text x="240" y="650" font-family="'Instrument Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Devis gratuit →</text>

  <!-- ClimaNova Logo area -->
  <text x="100" y="682" font-family="'Instrument Sans', system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.55)">ClimaNova</text>
  <text x="245" y="682" font-family="'Instrument Sans', system-ui, sans-serif" font-size="18" font-weight="300" fill="rgba(255,255,255,0.35)">Énergie</text>
  <text x="100" y="700" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">climanova-energie.fr</text>

  <!-- SPLIT UNIT ILLUSTRATION (right side) -->
  <!-- Indoor unit wall mount -->
  <rect x="830" y="200" width="380" height="100" rx="14" fill="white" opacity="0.92" filter="url(#shadow)"/>
  <rect x="830" y="200" width="380" height="8" rx="4" fill="#1664bf" opacity="0.9"/>
  <!-- Vents on indoor unit -->
  <rect x="850" y="225" width="340" height="3" rx="1.5" fill="#e0e0e0"/>
  <rect x="850" y="235" width="340" height="3" rx="1.5" fill="#e0e0e0"/>
  <rect x="850" y="245" width="340" height="3" rx="1.5" fill="#e0e0e0"/>
  <!-- Fan icon on indoor unit -->
  <circle cx="870" cy="272" r="14" fill="#e3f2fd"/>
  <circle cx="870" cy="272" r="6" fill="#1664bf" opacity="0.8"/>
  <!-- Power light -->
  <circle cx="1180" cy="272" r="5" fill="#66bb6a"/>
  <circle cx="1180" cy="272" r="8" fill="#66bb6a" fill-opacity="0.3"/>
  <!-- Brand text on unit -->
  <text x="1020" y="276" font-family="'Instrument Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1664bf" text-anchor="middle" opacity="0.7">CLIMATISATION</text>

  <!-- Air flow arrows from unit -->
  <path d="M 920 320 Q 900 380 880 440" stroke="#42a5f5" stroke-width="2.5" fill="none" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <path d="M 1020 310 Q 1020 370 1010 440" stroke="#42a5f5" stroke-width="2.5" fill="none" stroke-opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M 1120 320 Q 1140 380 1150 440" stroke="#42a5f5" stroke-width="2.5" fill="none" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Arrow heads -->
  <polygon points="880,440 873,422 887,422" fill="#42a5f5" opacity="0.5"/>
  <polygon points="1010,440 1003,422 1017,422" fill="#42a5f5" opacity="0.4"/>
  <polygon points="1150,440 1143,422 1157,422" fill="#42a5f5" opacity="0.5"/>

  <!-- Outdoor unit -->
  <rect x="860" y="490" width="200" height="140" rx="10" fill="#f5f5f5" opacity="0.88" filter="url(#softBlur)"/>
  <rect x="860" y="490" width="200" height="140" rx="10" fill="none" stroke="#ddd" stroke-width="2"/>
  <!-- Fan circle on outdoor unit -->
  <circle cx="960" cy="560" r="50" fill="none" stroke="#9e9e9e" stroke-width="2" opacity="0.6"/>
  <circle cx="960" cy="560" r="35" fill="none" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.7"/>
  <circle cx="960" cy="560" r="8" fill="#1664bf" opacity="0.6"/>
  <!-- Fan blades suggestion -->
  <line x1="960" y1="515" x2="960" y2="555" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="1000" y1="540" x2="965" y2="558" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="980" y1="598" x2="962" y2="565" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="920" y1="598" x2="958" y2="565" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="918" y1="540" x2="955" y2="558" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Outdoor unit label -->
  <text x="960" y="618" font-family="'Instrument Sans', system-ui, sans-serif" font-size="10" fill="#757575" text-anchor="middle" opacity="0.8">UNITÉ EXTÉRIEURE</text>

  <!-- Connecting pipes -->
  <path d="M 860 530 Q 790 520 780 350 Q 770 305 800 300 Q 820 300 820 300" stroke="#78909c" stroke-width="5" fill="none" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M 860 550 Q 785 540 775 345 Q 762 300 792 295 Q 812 295 812 295" stroke="#b0bec5" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Technician check badge -->
  <rect x="1080" y="490" width="220" height="90" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="1190" y="525" font-family="'Instrument Sans', system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">Entretien complet</text>
  <text x="1190" y="548" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">✓ Filtres  ✓ Circuit frigo</text>
  <text x="1190" y="566" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">✓ Électrique  ✓ Rapport</text>

  <!-- Temperature indicator -->
  <rect x="1100" y="320" width="130" height="60" rx="10" fill="rgba(255,100,50,0.2)" stroke="rgba(255,130,50,0.5)" stroke-width="1.5"/>
  <text x="1165" y="347" font-family="'Instrument Sans', system-ui, sans-serif" font-size="22" font-weight="800" fill="#FF7043" text-anchor="middle">38°C</text>
  <text x="1165" y="368" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Nice en été</text>

  <!-- Snowflake cool indicator -->
  <text x="1165" y="420" font-family="'Instrument Sans', system-ui, sans-serif" font-size="28" fill="#42a5f5" text-anchor="middle" opacity="0.8">❄</text>
  <text x="1165" y="450" font-family="'Instrument Sans', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">24°C intérieur</text>

  <!-- Decorative dots pattern -->
  <g opacity="0.15">
    <circle cx="780" cy="120" r="2" fill="white"/>
    <circle cx="800" cy="140" r="2" fill="white"/>
    <circle cx="820" cy="120" r="2" fill="white"/>
    <circle cx="840" cy="140" r="2" fill="white"/>
    <circle cx="860" cy="120" r="2" fill="white"/>
    <circle cx="780" cy="160" r="2" fill="white"/>
    <circle cx="800" cy="180" r="2" fill="white"/>
    <circle cx="820" cy="160" r="2" fill="white"/>
    <circle cx="840" cy="180" r="2" fill="white"/>
    <circle cx="860" cy="160" r="2" fill="white"/>
  </g>

</svg>
